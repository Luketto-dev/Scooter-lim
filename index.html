<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <title>Scooter Lim</title>

    <!-- google-fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300&display=swap" rel="stylesheet">

    <!-- link css -->
    <link rel="stylesheet" href="style.css">

  </head>
    <body>
      <div class="container">
        <!-- inzio header con logo e titiolo -->
        <header>
          <img src="img/logo.png" alt="">
          <h1>Taking Booleaners from A to B</h1>
          <!-- contenitore bottoni -->
          <div class="button-section">
            <button type="button" name="button">Prenota</button>
            <button type="button" name="button">Termina Prenotazione</button>
            <button type="button" name="button">Accendi Luci</button>
          </div>
        </header>

        <main>
          <!-- sezione Gino -->
          <section>
            <!-- inserisco la checkbox e il titolo all'interno di un div per far rimanere entrambi sulla stessa riga -->
            <div class = "input-title">
              <input type="checkbox">
              <h3>Monopattino Gino22</h3>
            </div>

            <div class="address">
              <span>&#8614;</span>
              <span>via Riccardoni - a 420 metri da te</span>
              <div> stato carica: </div>
              <div class="medium load"></div>
            </div>
          </section>

          <!-- sezione Mike -->
          <section>

            <div class = "input-title">
              <input type="checkbox">
              <h3>Monopattino Mike24</h3>
            </div>

            <div class="address">
              <span>&#8614;</span>
              <span>via Riccardoni - a 420 metri da te</span>
              <div> stato carica: </div>
              <div class="large load"></div>
            </div>
          </section>

          <!-- sezione Fede -->
          <section>

            <div class = "input-title">
              <input type="checkbox">
              <h3>Monopattino Fede154</h3>
            </div>

            <div class="address">
              <span>&#8614;</span>
              <span>via Riccardoni - a 420 metri da te</span>
              <div> stato carica: </div>
              <div class="small load"></div>
            </div>
          </section>
        </main>

      </div>
    </body>
</html>
